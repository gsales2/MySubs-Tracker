<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <title>MySubs Tracker | Login</title>
</head>

<body>
  <header></header>

  <main>
    <div class="form-container">
      <p class="title">Login</p>
      <form class="form">
        <div class="input-group">
          <input type="text" name="name" id="name" required/>
          <label for="name" class="label-login">Nome</label>
          <div class="underline"></div>
        </div>
        <div class="input-group">
          <input type="email" name="email" id="email" required/>
          <label for="email" class="label-login">E-mail</label>
          <div class="underline"></div>
        </div>
        <div class="input-group">
          <input type="password" name="password" id="password" required/>
          <label for="password" class="label-login">Senha</label>
          <div class="underline"></div>
        </div>
        <button class="sign">Entrar</button>
      </form>
      <div class="social-message">
        <div class="line"></div>
        <p class="message">Login por outros meios</p>
        <div class="line"></div>
      </div>
      <div class="social-icons">
        <button aria-label="Log in with Google" class="icon">
          <svg xmlns="https://www.w3.org/TR/SVG2/" viewBox="0 0 32 32" class="w-5 h-5 fill-current"></svg>
        </button>
        <button aria-label="Log in with GitHub" class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-5 h-5 fill-current"></svg>
        </button>
      </div>
      <p class="signup">
        Não tem conta?
        <a rel="noopener noreferrer" href="#" class="">Registre-se</a>
      </p>
    </div>
